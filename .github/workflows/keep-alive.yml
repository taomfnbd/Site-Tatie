name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 6 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase keep-alive endpoint
        run: |
          response=$(curl -s -w "\n%{http_code}" "https://alais-tavernier-naturopathe.fr/.netlify/functions/keep-alive")
          code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -1)
          echo "Status: $code - $body"
          [ "$code" -eq 200 ] || exit 1
